[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Netlify serves at the domain root, so BASE_PATH must be "/" (not the GitHub Pages subpath).
  BASE_PATH = "/"

# SPA fallback (though this app is single-index, it future-proofs client-side routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker must never be long-cached — users should always get updates.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"
